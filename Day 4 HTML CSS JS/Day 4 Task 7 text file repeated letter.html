<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Repeated letters check</title>
</head>
<body>
    <h3>Upload Text File</h3>
    <input type="file" id="fileInput" accept=".txt">
    <h3>Output:</h3>
    <div id="output"></div>

    <script>
        document.getElementById("fileInput").addEventListener("change", function (event) {
            const file = event.target.files[0];
            if (!file) {
                alert("Please select a file");
                return;
            }

            const reader = new FileReader();
            reader.onload = function (e) {
                const words = e.target.result.trim().split(/\r?\n/);
                const outputDiv = document.getElementById("output");
                outputDiv.innerHTML = "";

                words.forEach(word => {
                    word = word.trim();
                    if(word !== ""){
                        const result = findRecurring(word, 0, {});
                        let p = document.createElement("p");
                        if(result){
                            p.textContent = word + " ➞ " + JSON.stringify(result);
                        } else {
                            p.textContent = word + " ➞ No recurring character";
                        }
                        outputDiv.appendChild(p);
                    }
                });
            };
            reader.readAsText(file);
        });

        function findRecurring(word, index, seen) {
            if (index >= word.length) {
                return null;   
            }
            const char = word[index];
            if (seen.hasOwnProperty(char)) {
                return { [char]: [seen[char], index] };
            }
            seen[char] = index;
            return findRecurring(word, index + 1, seen);
        }
    </script>

</body>
</html>
