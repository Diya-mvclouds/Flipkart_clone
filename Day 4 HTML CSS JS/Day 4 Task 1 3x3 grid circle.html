<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid circle</title>
    <style>
        body{
            margin: 0;
            block-size: 100px;
            background-color: rgb(96, 37, 37);
        }

        .grid{
            display: grid;
            grid-template-columns: repeat(3,1fr);
            grid-template-rows: repeat(3,1fr);
            block-size: 100vh;
        }

        .cell{
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .circle{
            block-size: 200px;
            inline-size: 200px;
            background-color: wheat;
            border-radius: 50%;
            transition: 0.5s;
        }

        .cell:hover .circle{
            opacity: 0;
        }
    </style>
</head>
<body>
    <div class="grid">
        <div class="cell"><div class="circle"></div></div>
        <div class="cell"><div class="circle"></div></div>
        <div class="cell"><div class="circle"></div></div>
        <div class="cell"><div class="circle"></div></div>
        <div class="cell"><div class="circle"></div></div>
        <div class="cell"><div class="circle"></div></div>
        <div class="cell"><div class="circle"></div></div>
        <div class="cell"><div class="circle"></div></div>
        <div class="cell"><div class="circle"></div></div>
    </div>
</body>
</html>
