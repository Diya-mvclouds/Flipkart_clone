<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Flipkart</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f1f3f6;
            min-height: 100vh;
        }

        .header {
            background: #2874f0;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .logo img {
            height: 25px;
            filter: brightness(0) invert(1);
            cursor: pointer;
        }

        .cart-container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 20px;
        }

        .cart-items {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .cart-header {
            padding: 16px 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .cart-header h2 {
            font-size: 18px;
            font-weight: 600;
        }

        .cart-item {
            display: flex;
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            gap: 16px;
        }

        .cart-item:last-child {
            border-bottom: none;
        }

        .item-image {
            width: 120px;
            height: 120px;
            object-fit: contain;
        }

        .item-details {
            flex: 1;
        }

        .item-name {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 6px;
            color: #212121;
        }

        .item-brand {
            font-size: 12px;
            color: #878787;
            margin-bottom: 10px;
        }

        .item-price {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .current-price {
            font-size: 18px;
            font-weight: 700;
        }

        .original-price {
            font-size: 14px;
            color: #878787;
            text-decoration: line-through;
        }

        .discount {
            color: #00b85c;
            font-size: 14px;
            font-weight: 600;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .qty-btn {
            width: 32px;
            height: 32px;
            border: 1px solid #e0e0e0;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .qty-btn:hover {
            background: #f1f3f6;
        }

        .qty-value {
            font-size: 16px;
            font-weight: 600;
            min-width: 30px;
            text-align: center;
        }

        .remove-btn {
            color: #ff6161;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            margin-left: auto;
        }

        .remove-btn:hover {
            text-decoration: underline;
        }

        .cart-summary {
            position: sticky;
            top: 20px;
        }

        .summary-card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .summary-header {
            padding: 16px 20px;
            border-bottom: 1px solid #e0e0e0;
        }

        .summary-header h3 {
            font-size: 16px;
            font-weight: 600;
            color: #878787;
            text-transform: uppercase;
        }

        .summary-body {
            padding: 20px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .summary-row.total {
            padding-top: 12px;
            border-top: 1px dashed #e0e0e0;
            font-size: 18px;
            font-weight: 700;
            margin-top: 16px;
        }

        .checkout-btn {
            width: 100%;
            background: #ff9f00;
            color: white;
            padding: 16px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .checkout-btn:hover {
            background: #e68a00;
        }

        .checkout-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .empty-cart {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-cart img {
            width: 200px;
            margin-bottom: 20px;
        }

        .empty-cart h3 {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .empty-cart p {
            color: #878787;
            margin-bottom: 20px;
        }

        .shop-btn {
            background: #2874f0;
            color: white;
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        @media (max-width: 768px) {
            .cart-container {
                grid-template-columns: 1fr;
            }

            .cart-item {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }

            .quantity-controls {
                justify-content: center;
            }

            .remove-btn {
                margin-left: 0;
                margin-top: 12px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <img src="https://static-assets-web.flixcart.com/batman-returns/batman-returns/p/images/fkheaderlogo_exploreplus-44005d.svg" alt="Flipkart" onclick="window.location.href='index.html'">
        </div>
        <div style="color: white; font-weight: 600;">
            <i class="fas fa-shopping-cart"></i> My Cart
        </div>
    </header>

    <div class="cart-container">
        <div class="cart-items" id="cartItems">
            <div class="cart-header">
                <h2>My Cart (<span id="itemCount">0</span> items)</h2>
            </div>
            <div id="cartItemsList" class="loading">
                <i class="fas fa-spinner fa-spin" style="font-size: 24px; color: #2874f0;"></i>
            </div>
        </div>

        <div class="cart-summary">
            <div class="summary-card">
                <div class="summary-header">
                    <h3>Price Details</h3>
                </div>
                <div class="summary-body">
                    <div class="summary-row">
                        <span>Price (<span id="totalItems">0</span> items)</span>
                        <span id="originalTotal">₹0</span>
                    </div>
                    <div class="summary-row">
                        <span>Discount</span>
                        <span style="color: #00b85c;" id="totalDiscount">- ₹0</span>
                    </div>
                    <div class="summary-row">
                        <span>Delivery Charges</span>
                        <span style="color: #00b85c;">FREE</span>
                    </div>
                    <div class="summary-row total">
                        <span>Total Amount</span>
                        <span id="grandTotal">₹0</span>
                    </div>
                    <button class="checkout-btn" id="checkoutBtn" onclick="proceedToCheckout()">
                        PROCEED TO CHECKOUT
                    </button>
                </div>
            </div>
        </div>
    </div>

       <script>
        const API_URL = 'http://localhost:3000/api';
        let cartData = [];

        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }
            loadCart();
        });

        async function loadCart() {
            const token = localStorage.getItem('token');
            const cartList = document.getElementById('cartItemsList');
            
            try {
                const response = await fetch(`${API_URL}/cart`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    cartData = data.cartItems;
                    // Pass the new pricing object and items
                    renderCart(data.cartItems, data.pricing);
                } else {
                    cartList.innerHTML = '<p style="padding: 20px; text-align: center;">Failed to load cart. Please login again.</p>';
                }
            } catch (error) {
                console.error('Error loading cart:', error);
                cartList.innerHTML = '<p style="padding: 20px; text-align: center; color: red;">Network Error. Check console.</p>';
            }
        }

        function renderCart(items, pricing) {
            const cartList = document.getElementById('cartItemsList');
            
            // If cart is empty
            if (!items || items.length === 0) {
                cartList.innerHTML = `
                    <div class="empty-cart">
                        <img src="https://rukminim1.flixcart.com/www/800/800/promos/16/05/2019/d438a32e-765a-4d8b-b4a6-520b560971e8.png?q=90" alt="Empty Cart">
                        <h3>Your cart is empty!</h3>
                        <p>Add items to it now.</p>
                        <button class="shop-btn" onclick="window.location.href='index.html'">Shop Now</button>
                    </div>
                `;
                document.getElementById('checkoutBtn').disabled = true;
                // Reset totals
                document.getElementById('grandTotal').textContent = '₹0';
                return;
            }

            let html = '';
            
            items.forEach(item => {
                const price = item.discount_price || item.price;
                const discountPercent = item.discount_price 
                    ? Math.round(((item.price - item.discount_price) / item.price) * 100)
                    : 0;
                
                html += `
                    <div class="cart-item" data-id="${item.cart_id}">
                        <img src="${item.image_url}" alt="${item.name}" class="item-image"
                             onerror="this.src='https://via.placeholder.com/120?text=No+Image'">
                        <div class="item-details">
                            <h3 class="item-name">${item.name}</h3>
                            <p class="item-brand">${item.brand || 'Brand'}</p>
                            <div class="item-price">
                                <span class="current-price">₹${price.toLocaleString()}</span>
                                ${item.discount_price ? `
                                    <span class="original-price">₹${item.price.toLocaleString()}</span>
                                    <span class="discount">${discountPercent}% off</span>
                                ` : ''}
                            </div>
                            <div class="quantity-controls">
                                <button class="qty-btn" onclick="updateQuantity(${item.cart_id}, ${item.quantity - 1})">-</button>
                                <span class="qty-value">${item.quantity}</span>
                                <button class="qty-btn" onclick="updateQuantity(${item.cart_id}, ${item.quantity + 1})">+</button>
                                <div class="remove-btn" onclick="removeItem(${item.cart_id})">
                                    <i class="fas fa-trash"></i> Remove
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            cartList.innerHTML = html;
            
            // Update summary using the 'pricing' object from backend
            const itemCount = items.reduce((sum, item) => sum + item.quantity, 0);
            
            document.getElementById('itemCount').textContent = itemCount;
            document.getElementById('totalItems').textContent = itemCount;
            
            // FIX: Use 'pricing' object instead of 'total'
            document.getElementById('originalTotal').textContent = '₹' + pricing.totalMrp.toLocaleString();
            document.getElementById('totalDiscount').textContent = '- ₹' + pricing.totalDiscount.toLocaleString();
            document.getElementById('grandTotal').textContent = '₹' + pricing.finalAmount.toLocaleString();
            
            document.getElementById('checkoutBtn').disabled = false;
        }

        async function updateQuantity(cartId, quantity) {
            if (quantity < 1) {
                removeItem(cartId);
                return;
            }
            
            const token = localStorage.getItem('token');
            
            try {
                const response = await fetch(`${API_URL}/cart/update`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ cartId, quantity })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    loadCart(); // Reload cart to update prices
                }
            } catch (error) {
                console.error('Error updating quantity:', error);
            }
        }

        async function removeItem(cartId) {
            const token = localStorage.getItem('token');
            
            if (!confirm('Remove this item from cart?')) return;

            try {
                const response = await fetch(`${API_URL}/cart/remove/${cartId}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    loadCart(); // Reload cart
                }
            } catch (error) {
                console.error('Error removing item:', error);
            }
        }

        function proceedToCheckout() {
            window.location.href = 'checkout.html';
        }
    </script>
</body>
</html>
