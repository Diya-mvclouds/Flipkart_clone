<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Flipkart</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/static.css">
    <style>
        .contact-form { max-width: 500px; margin-top: 30px; }
        .contact-form input, .contact-form textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; }
        .contact-form button { background: #2874f0; color: white; border: none; padding: 12px 24px; border-radius: 4px; cursor: pointer; font-weight: 600; }
        .contact-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .contact-card { background: #f9f9f9; padding: 20px; border-radius: 8px; text-align: center; }
        .contact-card i { font-size: 24px; color: #2874f0; margin-bottom: 10px; }
        @media (max-width: 600px) { .contact-info-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header class="static-header">
        <div class="logo" onclick="window.location.href='index.html'">
            <img src="https://static-assets-web.flixcart.com/batman-returns/batman-returns/p/images/fkheaderlogo_exploreplus-44005d.svg" alt="Flipkart">
        </div>
        <div class="nav-links">
            <a href="index.html">Home</a>
        </div>
    </header>

    <div class="static-container">
        <h1>Contact Us</h1>
        <p>Have questions? We'd love to hear from you. Send us a message and we'll respond as soon as possible.</p>

        <div class="contact-info-grid">
            <div class="contact-card">
                <i class="fas fa-envelope"></i>
                <h3>Email</h3>
                <p>support@flipkart.com</p>
            </div>
            <div class="contact-card">
                <i class="fas fa-phone"></i>
                <h3>Phone</h3>
                <p>+91 9876543210</p>
            </div>
        </div>

        <h2 style="margin-top: 40px;">Send a Message</h2>
        <form class="contact-form" onsubmit="alert('Message Sent! (Demo)'); return false;">
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea rows="5" placeholder="Your Message" required></textarea>
            <button type="submit">Send Message</button>
        </form>
    </div>

    <footer class="static-footer">
        &copy; 2024 Flipkart. For Educational Purposes Only.
    </footer>
</body>
</html>
